<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kahoot Free - Play</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 18px;
        }

        @media (min-width: 400px) { html { font-size: 20px; } }
        @media (min-width: 500px) { html { font-size: 22px; } }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #46178f;
            color: #fff;
            height: 100dvh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            padding: 20px;
            text-align: center;
            animation: screenFadeIn 0.35s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes screenFadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ── Join screen ── */

        #join-screen .title {
            font-size: 2.6rem;
            font-weight: 900;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        #join-screen .form {
            width: 100%;
            max-width: 400px;
            padding: 0 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        #join-screen input {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            text-align: center;
            outline: none;
            font-weight: 700;
            color: #333;
        }

        #pin-input::placeholder,
        #nickname-input::placeholder {
            color: #999;
            font-weight: 400;
        }

        #join-btn {
            padding: 1rem;
            font-size: 1.2rem;
            font-weight: 800;
            border: none;
            border-radius: 10px;
            background: #fff;
            color: #46178f;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #join-btn:active {
            transform: scale(0.96);
        }

        #join-error {
            color: #ff6b6b;
            font-size: 0.95rem;
            min-height: 1.2em;
            margin-top: 4px;
            font-weight: 600;
        }

        /* ── Waiting screen ── */

        #waiting-screen .nickname-display {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        #waiting-screen .waiting-text {
            font-size: 1rem;
            opacity: 0.85;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ── Question screen ── */

        #question-screen {
            justify-content: flex-start;
            padding: 0;
        }

        .timer-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        .timer-bar {
            height: 100%;
            background: #fff;
            width: 100%;
            transform-origin: left;
        }

        .timer-bar.running {
            animation: shrink-bar linear forwards;
        }

        @keyframes shrink-bar {
            from { width: 100%; }
            to { width: 0%; }
        }

        .question-header {
            width: 100%;
            padding: 0.8rem 1rem 0.5rem;
            flex-shrink: 0;
        }

        .question-counter {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 0.3rem;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.3;
        }

        .answers-container {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            padding: 0.4rem 0.6rem 0.6rem;
            overflow: hidden;
        }

        .answer-btn {
            flex: 1;
            min-height: 3rem;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.8rem;
            transition: transform 0.1s, opacity 0.15s;
            text-align: left;
        }

        .answer-btn:active:not(:disabled) {
            transform: scale(0.97);
        }

        .answer-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .answer-btn .shape {
            font-size: 1.3rem;
            flex-shrink: 0;
            width: 1.6rem;
            text-align: center;
        }

        .answer-btn .answer-text {
            flex: 1;
            line-height: 1.2;
            font-size: 0.95rem;
        }

        .answer-btn.red    { background: #e21b3c; }
        .answer-btn.blue   { background: #1368ce; }
        .answer-btn.green  { background: #26890c; }
        .answer-btn.yellow { background: #d89e00; }
        .answer-btn.purple { background: #863bba; }
        .answer-btn.teal   { background: #009d9a; }

        .question-image-player { max-height: 120px; max-width: 90%; border-radius: 8px; margin-bottom: 8px; object-fit: contain; }

        /* ── Answered screen ── */

        #answered-screen .checkmark {
            font-size: 3.5rem;
            margin-bottom: 16px;
        }

        #answered-screen .submitted-text {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        #answered-screen .waiting-text {
            font-size: 1rem;
            opacity: 0.7;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* ── Result screen ── */

        #result-screen .result-icon {
            font-size: 4rem;
            margin-bottom: 0.6rem;
            animation: resultPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes resultPop {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.3); }
            100% { transform: scale(1); opacity: 1; }
        }

        #result-screen .points-earned {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 0.4rem;
            animation: slideUp 0.4s ease 0.2s both;
        }

        #result-screen .speed-stats {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 0.5rem;
            animation: slideUp 0.4s ease 0.35s both;
        }

        #result-screen .speed-bar-container {
            width: 80%;
            max-width: 280px;
            height: 0.4rem;
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
            margin-bottom: 14px;
            overflow: hidden;
            animation: slideUp 0.4s ease 0.4s both;
        }

        #result-screen .speed-bar {
            height: 100%;
            border-radius: 4px;
            background: #2ecc71;
            transition: width 0.8s ease 0.6s;
        }

        #result-screen .total-score {
            font-size: 1.1rem;
            opacity: 0.85;
            margin-bottom: 6px;
            animation: slideUp 0.4s ease 0.5s both;
        }

        #result-screen .rank-display {
            font-size: 1rem;
            opacity: 0.7;
            animation: slideUp 0.4s ease 0.6s both;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* ── Final screen ── */

        #final-screen .game-over-title {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 0.8rem;
        }

        #final-screen .final-rank {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        #final-screen .final-score {
            font-size: 1rem;
            opacity: 0.85;
            margin-bottom: 1.2rem;
        }

        .leaderboard {
            width: 100%;
            max-width: 400px;
            padding: 0 0.5rem;
            margin-bottom: 1.4rem;
        }

        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            margin-bottom: 0.35rem;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .leaderboard-row .lb-rank {
            width: 32px;
            text-align: left;
            opacity: 0.7;
        }

        .leaderboard-row .lb-name {
            flex: 1;
            text-align: left;
        }

        .leaderboard-row .lb-score {
            text-align: right;
            opacity: 0.8;
        }

        .play-again-btn {
            padding: 0.8rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 800;
            border: none;
            border-radius: 10px;
            background: #fff;
            color: #46178f;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .play-again-btn:active {
            transform: scale(0.96);
        }

        /* ── Error screen ── */

        #error-screen .error-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
            opacity: 0.8;
        }

        #error-screen .error-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        #error-screen .error-reason {
            font-size: 1rem;
            opacity: 0.75;
            margin-bottom: 28px;
        }
    </style>
</head>
<body>

    <!-- 1. Join screen -->
    <div id="join-screen" class="screen active">
        <div class="title">Kahoot Free</div>
        <div class="form">
            <input id="pin-input" type="tel" maxlength="6" placeholder="Game PIN" inputmode="numeric" autocomplete="off">
            <input id="nickname-input" type="text" maxlength="20" placeholder="Nickname" autocomplete="off">
            <button id="join-btn">Join!</button>
            <div id="join-error"></div>
        </div>
    </div>

    <!-- 2. Waiting screen -->
    <div id="waiting-screen" class="screen">
        <div class="nickname-display" id="waiting-nickname"></div>
        <div class="waiting-text">Waiting for host to start...</div>
    </div>

    <!-- 3. Question screen -->
    <div id="question-screen" class="screen">
        <div class="timer-bar-container">
            <div class="timer-bar" id="timer-bar"></div>
        </div>
        <div class="question-header">
            <div class="question-counter" id="question-counter"></div>
            <div class="question-text" id="question-text"></div>
            <img class="question-image-player" id="question-image" style="display:none">
        </div>
        <div class="answers-container" id="answers-container"></div>
    </div>

    <!-- 4. Answered screen -->
    <div id="answered-screen" class="screen">
        <div class="checkmark">✔</div>
        <div class="submitted-text">Answer submitted!</div>
        <div class="waiting-text">Waiting for everyone...</div>
    </div>

    <!-- 5. Result screen -->
    <div id="result-screen" class="screen">
        <div class="result-icon" id="result-icon"></div>
        <div class="points-earned" id="points-earned"></div>
        <div class="speed-stats" id="speed-stats"></div>
        <div class="speed-bar-container"><div class="speed-bar" id="speed-bar"></div></div>
        <div class="total-score" id="total-score"></div>
        <div class="rank-display" id="rank-display"></div>
    </div>

    <!-- 6. Final screen -->
    <div id="final-screen" class="screen">
        <div class="game-over-title">Game Over!</div>
        <div class="final-rank" id="final-rank"></div>
        <div class="final-score" id="final-score"></div>
        <div class="leaderboard" id="leaderboard"></div>
        <button class="play-again-btn" id="play-again-btn">Play Again</button>
    </div>

    <!-- 7. Error screen -->
    <div id="error-screen" class="screen">
        <div class="error-icon">⚡</div>
        <div class="error-title" id="error-title">Disconnected</div>
        <div class="error-reason" id="error-reason"></div>
        <button class="play-again-btn" id="rejoin-btn">Rejoin</button>
    </div>

    <div id="game-background" style="position:fixed;top:0;left:0;right:0;bottom:0;background-size:cover;background-position:center;opacity:0.25;z-index:-1;pointer-events:none;display:none;"></div>

    <script>
        // ── State ──
        let ws = null;
        let nickname = '';
        let currentPin = '';

        // ── Helpers ──
        const screens = document.querySelectorAll('.screen');

        function showScreen(id) {
            screens.forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function ordinal(n) {
            const s = ['th', 'st', 'nd', 'rd'];
            const v = n % 100;
            return n + (s[(v - 20) % 10] || s[v] || s[0]);
        }

        // ── Join ──
        const pinInput = document.getElementById('pin-input');
        const nicknameInput = document.getElementById('nickname-input');
        const joinBtn = document.getElementById('join-btn');
        const joinError = document.getElementById('join-error');

        // Auto-fill PIN from URL
        const urlPin = new URLSearchParams(location.search).get('pin');
        if (urlPin) {
            pinInput.value = urlPin;
        }

        joinBtn.addEventListener('click', connect);
        nicknameInput.addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });
        pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') nicknameInput.focus(); });

        function connect() {
            const pin = pinInput.value.trim();
            const nick = nicknameInput.value.trim();

            joinError.textContent = '';

            if (!pin) {
                joinError.textContent = 'Enter a game PIN';
                return;
            }
            if (!nick) {
                joinError.textContent = 'Enter a nickname';
                return;
            }

            nickname = nick;
            currentPin = pin;
            joinBtn.disabled = true;
            joinBtn.textContent = 'Connecting...';

            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws/play/${pin}`);

            ws.onopen = function () {
                ws.send(JSON.stringify({ type: 'join', nickname: nickname }));
            };

            ws.onmessage = function (event) {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };

            ws.onclose = function () {
                // Only show error if we're not already on final or error screen
                const finalActive = document.getElementById('final-screen').classList.contains('active');
                const errorActive = document.getElementById('error-screen').classList.contains('active');
                if (!finalActive && !errorActive) {
                    showError('Disconnected', 'Connection to the server was lost.');
                }
            };

            ws.onerror = function () {
                joinBtn.disabled = false;
                joinBtn.textContent = 'Join!';
                joinError.textContent = 'Could not connect to server';
            };
        }

        // ── Message handler ──
        function handleMessage(data) {
            switch (data.type) {
                case 'joined':
                    joinBtn.disabled = false;
                    joinBtn.textContent = 'Join!';
                    document.getElementById('waiting-nickname').textContent = nickname;
                    // Apply game background
                    if (data.background_url) {
                        const bg = document.getElementById('game-background');
                        bg.style.backgroundImage = `url(${data.background_url})`;
                        bg.style.display = 'block';
                    }
                    showScreen('waiting-screen');
                    break;

                case 'question':
                    showQuestion(data);
                    break;

                case 'answer_accepted':
                    showScreen('answered-screen');
                    break;

                case 'result':
                    showResult(data);
                    break;

                case 'finished':
                    showFinal(data);
                    break;

                case 'game_over':
                    showError('Game Over', data.reason || 'The game has ended.');
                    break;

                case 'error':
                    joinBtn.disabled = false;
                    joinBtn.textContent = 'Join!';
                    // If still on join screen, show inline error
                    if (document.getElementById('join-screen').classList.contains('active')) {
                        joinError.textContent = data.message;
                    } else {
                        showError('Error', data.message);
                    }
                    break;
            }
        }

        // ── Question screen ──
        const shapes = ['▲', '◆', '●', '■', '⬡', '✦'];
        const colors = ['red', 'blue', 'green', 'yellow', 'purple', 'teal'];

        function showQuestion(data) {
            document.getElementById('question-counter').textContent =
                `Question ${data.index + 1} of ${data.total}`;
            document.getElementById('question-text').textContent = data.text;

            // Question image
            const qImg = document.getElementById('question-image');
            if (data.image_url) { qImg.src = data.image_url; qImg.style.display = 'block'; }
            else { qImg.style.display = 'none'; }

            // Timer bar
            const timerBar = document.getElementById('timer-bar');
            timerBar.classList.remove('running');
            // Force reflow to restart animation
            void timerBar.offsetWidth;
            timerBar.style.animationDuration = data.time_limit + 's';
            timerBar.classList.add('running');

            // Build answer buttons
            const container = document.getElementById('answers-container');
            container.innerHTML = '';

            data.answers.forEach((answer, i) => {
                const btn = document.createElement('button');
                btn.className = `answer-btn ${colors[i]}`;
                btn.innerHTML = `<span class="shape">${shapes[i]}</span><span class="answer-text">${escapeHtml(answer)}</span>`;
                btn.addEventListener('click', () => sendAnswer(i, container));
                container.appendChild(btn);
            });

            showScreen('question-screen');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sendAnswer(index, container) {
            // Disable all buttons
            container.querySelectorAll('.answer-btn').forEach(btn => {
                btn.disabled = true;
            });

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'answer', index: index }));
            }

            showScreen('answered-screen');
        }

        // ── Result screen ──
        function showResult(data) {
            // Icon
            const icon = document.getElementById('result-icon');
            icon.textContent = data.correct ? '✓' : '✗';
            icon.style.color = data.correct ? '#2ecc71' : '#e74c3c';
            // Force re-trigger animation
            icon.style.animation = 'none';
            void icon.offsetWidth;
            icon.style.animation = '';

            document.getElementById('points-earned').textContent = `+${data.points} points`;

            // Speed stats
            const speedStats = document.getElementById('speed-stats');
            const speedBar = document.getElementById('speed-bar');

            if (data.time_ms > 0 && data.total_answered > 0) {
                const timeSec = (data.time_ms / 1000).toFixed(1);
                const fasterThan = Math.round(((data.total_answered - data.speed_rank) / data.total_answered) * 100);
                if (data.total_answered === 1) {
                    speedStats.textContent = `Answered in ${timeSec}s`;
                } else if (fasterThan >= 50) {
                    speedStats.textContent = `${timeSec}s — faster than ${fasterThan}% of players!`;
                } else {
                    speedStats.textContent = `${timeSec}s — ${ordinal(data.speed_rank)} fastest`;
                }
                // Bar: how fast compared to time limit (inverse: faster = more bar)
                const pct = Math.max(5, Math.min(100, 100 - (data.time_ms / (data.time_ms + data.average_ms)) * 100));
                speedBar.style.width = '0%';
                requestAnimationFrame(() => { speedBar.style.width = pct + '%'; });
                speedBar.style.background = data.correct ? '#2ecc71' : '#e74c3c';
            } else {
                speedStats.textContent = "Didn't answer in time";
                speedBar.style.width = '0%';
            }

            document.getElementById('total-score').textContent = `Total: ${data.score} points`;
            document.getElementById('rank-display').textContent =
                `${ordinal(data.rank)} of ${data.total_players} players`;
            showScreen('result-screen');
        }

        // ── Final screen ──
        function showFinal(data) {
            showScreen('final-screen');
            const rankEl = document.getElementById('final-rank');
            const scoreEl = document.getElementById('final-score');
            const lb = document.getElementById('leaderboard');
            rankEl.textContent = '';
            scoreEl.textContent = '';
            lb.innerHTML = '';

            const top5 = (data.leaderboard || []).slice(0, 5);
            const emojis = ['\uD83E\uDD47', '\uD83E\uDD48', '\uD83E\uDD49'];

            // Reveal leaderboard one by one (3rd→2nd→1st then rest)
            const revealOrder = [];
            for (let i = Math.min(2, top5.length - 1); i >= 0; i--) revealOrder.push(i);
            for (let i = 3; i < top5.length; i++) revealOrder.push(i);

            let step = 0;
            function revealRow() {
                if (step >= revealOrder.length) {
                    // Show player's own result
                    setTimeout(() => {
                        rankEl.textContent = `You finished ${ordinal(data.rank)}!`;
                        rankEl.style.animation = 'none'; void rankEl.offsetWidth;
                        rankEl.style.animation = 'screenFadeIn 0.5s ease';
                        scoreEl.textContent = `${data.score} points`;
                    }, 400);
                    return;
                }
                const i = revealOrder[step];
                const entry = top5[i];
                const row = document.createElement('div');
                row.className = 'leaderboard-row';
                row.style.opacity = '0';
                row.style.transform = 'scale(0.8)';
                row.innerHTML =
                    `<span class="lb-rank">${i < 3 ? emojis[i] : (i+1) + '.'}</span>` +
                    `<span class="lb-name">${escapeHtml(entry.nickname)}</span>` +
                    `<span class="lb-score">${entry.score}</span>`;

                // Insert in correct position
                const existing = lb.children;
                let inserted = false;
                for (let j = 0; j < existing.length; j++) {
                    if (parseInt(existing[j].dataset.pos) > i) {
                        lb.insertBefore(row, existing[j]);
                        inserted = true;
                        break;
                    }
                }
                if (!inserted) lb.appendChild(row);
                row.dataset.pos = i;

                requestAnimationFrame(() => {
                    row.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    row.style.opacity = '1';
                    row.style.transform = 'scale(1)';
                });

                step++;
                setTimeout(revealRow, step <= 3 ? 1200 : 400);
            }

            setTimeout(revealRow, 600);
        }

        // ── Error screen ──
        function showError(title, reason) {
            document.getElementById('error-title').textContent = title;
            document.getElementById('error-reason').textContent = reason || '';
            showScreen('error-screen');
        }

        // ── Navigation buttons ──
        document.getElementById('play-again-btn').addEventListener('click', resetToJoin);
        document.getElementById('rejoin-btn').addEventListener('click', resetToJoin);

        function resetToJoin() {
            if (ws) {
                ws.onclose = null;
                ws.close();
                ws = null;
            }
            const bg = document.getElementById('game-background');
            bg.style.backgroundImage = '';
            bg.style.display = 'none';
            joinBtn.disabled = false;
            joinBtn.textContent = 'Join!';
            joinError.textContent = '';
            nicknameInput.value = '';
            showScreen('join-screen');
        }
    </script>
</body>
</html>
